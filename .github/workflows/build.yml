name: Build gulpegaspe-kinoite-bootc

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permette di avviare manualmente il workflow

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # Nome immagine: ghcr.io/USER/REPO

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Permesso necessario per scrivere su GitHub Packages [citation:1][citation:2]

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v7
      - name: run podman build
        run: podman build -t ${{ env.IMAGE_NAME }} --disable-compression=false .
      - name: push image to ghcr.io
        run: podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.IMAGE_NAME }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
