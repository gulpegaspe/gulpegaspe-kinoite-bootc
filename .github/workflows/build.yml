name: Build -> gulpegaspe-os

on:
  #push:
  #  branches: [ "main" ]
  workflow_dispatch:  # It allows you to manually start the workflow

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # gulpegaspe/gulpegaspe-os

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Permission required to write to GitHub Packages

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v7
      - name: run podman build
        run: podman build -t ${{ env.IMAGE_NAME }} --disable-compression=false .
      - name: push image to ghcr.io
        run: podman push --creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} ${{ env.IMAGE_NAME }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
